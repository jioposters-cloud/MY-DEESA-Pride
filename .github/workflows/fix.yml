name: Fix
on: workflow_dispatch
jobs:
  fix:
      runs-on: ubuntu-latest
          steps:
                - uses: actions/checkout@v4
                      - run: |
                                echo "name: Build Android AAB" > .github/workflows/build-aab.yml
                                          echo "on:" >> .github/workflows/build-aab.yml
                                                    echo "  workflow_dispatch:" >> .github/workflows/build-aab.yml
                                                              echo "  push:" >> .github/workflows/build-aab.yml
                                                                        echo "    branches: [main]" >> .github/workflows/build-aab.yml
                                                                                  echo "jobs:" >> .github/workflows/build-aab.yml
                                                                                            echo "  build:" >> .github/workflows/build-aab.yml
                                                                                                      echo "    runs-on: ubuntu-latest" >> .github/workflows/build-aab.yml
                                                                                                                echo "    steps:" >> .github/workflows/build-aab.yml
                                                                                                                          echo "      - uses: actions/checkout@v4" >> .github/workflows/build-aab.yml
                                                                                                                                    echo "      - uses: actions/setup-java@v4" >> .github/workflows/build-aab.yml
                                                                                                                                              echo "        with:" >> .github/workflows/build-aab.yml
                                                                                                                                                        echo "          java-version: '17'" >> .github/workflows/build-aab.yml
                                                                                                                                                                  echo "          distribution: 'temurin'" >> .github/workflows/build-aab.yml
                                                                                                                                                                            echo "      - uses: actions/setup-node@v4" >> .github/workflows/build-aab.yml
                                                                                                                                                                                      echo "        with:" >> .github/workflows/build-aab.yml
                                                                                                                                                                                                echo "          node-version: '20'" >> .github/workflows/build-aab.yml
                                                                                                                                                                                                          echo "      - name: Setup Android SDK" >> .github/workflows/build-aab.yml
                                                                                                                                                                                                                    echo "        uses: android-actions/setup-android@v3" >> .github/workflows/build-aab.yml
                                                                                                                                                                                                                              echo "      - name: Install Bubblewrap" >> .github/workflows/build-aab.yml
                                                                                                                                                                                                                                        echo "        run: npm install -g @bubblewrap/cli" >> .github/workflows/build-aab.yml
                                                                                                                                                                                                                                                  echo "      - name: Init TWA project" >> .github/workflows/build-aab.yml
                                                                                                                                                                                                                                                            echo "        run: |" >> .github/workflows/build-aab.yml
                                                                                                                                                                                                                                                                      echo "          mkdir twa && cd twa" >> .github/workflows/build-aab.yml
                                                                                                                                                                                                                                                                                echo "          bubblewrap init --manifest https://mydeesa.netlify.app/manifest.json --skipPwaValidation || true" >> .github/workflows/build-aab.yml
                                                                                                                                                                                                                                                                                          echo "      - name: Build AAB" >> .github/workflows/build-aab.yml
                                                                                                                                                                                                                                                                                                    echo "        run: |" >> .github/workflows/build-aab.yml
                                                                                                                                                                                                                                                                                                              echo "          cd twa" >> .github/workflows/build-aab.yml
                                                                                                                                                                                                                                                                                                                        echo "          chmod +x gradlew" >> .github/workflows/build-aab.yml
                                                                                                                                                                                                                                                                                                                                  echo "          ./gradlew bundleRelease || ./gradlew bundleDebug || true" >> .github/workflows/build-aab.yml
                                                                                                                                                                                                                                                                                                                                            echo "      - name: Find and upload AAB" >> .github/workflows/build-aab.yml
                                                                                                                                                                                                                                                                                                                                                      echo "        uses: actions/upload-artifact@v4" >> .github/workflows/build-aab.yml
                                                                                                                                                                                                                                                                                                                                                                echo "        with:" >> .github/workflows/build-aab.yml
                                                                                                                                                                                                                                                                                                                                                                          echo "          name: mydeesa-aab" >> .github/workflows/build-aab.yml
                                                                                                                                                                                                                                                                                                                                                                                    echo "          path: twa/app/build/outputs/bundle/**/*.aab" >> .github/workflows/build-aab.yml
                                                                                                                                                                                                                                                                                                                                                                                              echo "          if-no-files-found: warn" >> .github/workflows/build-aab.yml
                                                                                                                                                                                                                                                                                                                                                                                                    - name: Commit and push
                                                                                                                                                                                                                                                                                                                                                                                                            run: |
                                                                                                                                                                                                                                                                                                                                                                                                                      git config --global user.name "Actions Bot"
                                                                                                                                                                                                                                                                                                                                                                                                                                git config --global user.email "bot@github.com"
                                                                                                                                                                                                                                                                                                                                                                                                                                          git add .github/workflows/build-aab.yml
                                                                                                                                                                                                                                                                                                                                                                                                                                                    git commit -m "Fix"
                                                                                                                                                                                                                                                                                                                                                                                                                                                              git push
                                                                                                                                                                                                                                                                                                                                                                                                                                                              
