name: Build AAB
on:
  workflow_dispatch:
    push:
        branches: [main]
        jobs:
          build:
              runs-on: ubuntu-latest
                  steps:
                        - uses: actions/checkout@v4
                              - uses: actions/setup-node@v4
                                      with:
                                                node-version: 20
                                                      - uses: actions/setup-java@v4
                                                              with:
                                                                        distribution: temurin
                                                                                  java-version: 17
                                                                                        - run: npm install -g @bubblewrap/cli
                                                                                              - run: |
                                                                                                        mkdir twa-project
                                                                                                                  cat > twa-project/twa-manifest.json << 'EOF'
                                                                                                                            {
                                                                                                                                        "packageId": "in.mydeesa.app",
                                                                                                                                                    "host": "mydeesa.netlify.app",
                                                                                                                                                                "name": "MY DEESA",
                                                                                                                                                                            "launcherName": "MY DEESA",
                                                                                                                                                                                        "display": "standalone",
                                                                                                                                                                                                    "themeColor": "#1a1a2e",
                                                                                                                                                                                                                "navigationColor": "#1a1a2e",
                                                                                                                                                                                                                            "backgroundColor": "#1a1a2e",
                                                                                                                                                                                                                                        "enableNotifications": false,
                                                                                                                                                                                                                                                    "startUrl": "/",
                                                                                                                                                                                                                                                                "iconUrl": "https://mydeesa.netlify.app/icon-512.png",
                                                                                                                                                                                                                                                                            "maskableIconUrl": "https://mydeesa.netlify.app/icon-512.png",
                                                                                                                                                                                                                                                                                        "appVersion": "1",
                                                                                                                                                                                                                                                                                                    "appVersionName": "1.0.0",
                                                                                                                                                                                                                                                                                                                "shortcuts": [],
                                                                                                                                                                                                                                                                                                                            "generatorApp": "bubblewrap-cli",
                                                                                                                                                                                                                                                                                                                                        "webManifestUrl": "https://mydeesa.netlify.app/manifest.json",
                                                                                                                                                                                                                                                                                                                                                    "fallbackType": "customtabs",
                                                                                                                                                                                                                                                                                                                                                                "features": {},
                                                                                                                                                                                                                                                                                                                                                                            "alphaDependencies": {
                                                                                                                                                                                                                                                                                                                                                                                          "enabled": false
                                                                                                                                                                                                                                                                                                                                                                                                      },
                                                                                                                                                                                                                                                                                                                                                                                                                  "enableSiteSettingsShortcut": true,
                                                                                                                                                                                                                                                                                                                                                                                                                              "isChromeOSOnly": false,
                                                                                                                                                                                                                                                                                                                                                                                                                                          "isMetaQuest": false,
                                                                                                                                                                                                                                                                                                                                                                                                                                                      "minSdkVersion": 24,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                  "orientation": "default",
                                                                                                                                                                                                                                                                                                                                                                                                                                                                              "fingerprints": []
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  EOF
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        - run: cd twa-project && bubblewrap init --manifest https://mydeesa.netlify.app/manifest.json --skipPwaValidation
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                continue-on-error: true
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      - run: cd twa-project && chmod +x gradlew && ./gradlew bundleDebug
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            - uses: actions/upload-artifact@v4
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    with:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              name: mydeesa-aab
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        path: twa-project/app/build/outputs/bundle/debug/app-debug.aab
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        
